<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7"/>
      <stop offset="100%" style="stop-color:#29B6F6"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#673AB7"/>
      <stop offset="100%" style="stop-color:#512DA8"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3"/>
      <stop offset="100%" style="stop-color:#00BCD4"/>
    </linearGradient>
    <radialGradient id="bgRadial" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#0a0a2a"/>
      <stop offset="100%" style="stop-color:#050510"/>
    </radialGradient>
    <filter id="iconGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Black background -->
  <rect width="1024" height="1024" fill="#000000"/>

  <!-- Circle icon background -->
  <circle cx="512" cy="420" r="300" fill="url(#bgRadial)"/>

  <!-- EVD logo -->
  <g transform="translate(512, 420)" filter="url(#iconGlow)">
    <!-- Letter E: three horizontal bars + left vertical -->
    <g fill="url(#cyanGrad)">
      <rect x="-180" y="-95" width="110" height="24" rx="4"/>
      <rect x="-180" y="-12" width="85" height="24" rx="4"/>
      <rect x="-180" y="71" width="110" height="24" rx="4"/>
      <rect x="-180" y="-95" width="24" height="190" rx="4"/>
    </g>

    <!-- Lightning bolt (replaces V, connects E and D) -->
    <path d="M -15,-105 L 45,-105 L 12,-25 L 58,-25 L -18,105 L 17,15 L -32,15 Z"
          fill="url(#boltGrad)" stroke="#00BCD4" stroke-width="2" stroke-linejoin="round"/>

    <!-- Letter D: proper D shape using path -->
    <path d="M 75,-95 L 75,95 L 130,95 Q 190,95 190,0 Q 190,-95 130,-95 Z
             M 99,-71 L 130,-71 Q 166,-71 166,0 Q 166,71 130,71 L 99,71 Z"
          fill="url(#purpleGrad)" fill-rule="evenodd"/>
  </g>

  <!-- "EVDx" text below -->
  <text x="512" y="830" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="72" font-weight="700" fill="#CCCCCC" letter-spacing="2">EVDx</text>
</svg>
