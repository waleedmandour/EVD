<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D2FF"/>
      <stop offset="100%" style="stop-color:#7B2FBE"/>
    </linearGradient>
    <filter id="logoGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: dark rounded square (app theme) -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="#0D1117"/>

  <!-- Logo: gradient rounded square with lightning bolt (matches app header) -->
  <g transform="translate(512, 420)">
    <!-- Gradient square -->
    <rect x="-200" y="-200" width="400" height="400" rx="88" ry="88" fill="url(#logoGrad)" filter="url(#logoGlow)"/>

    <!-- Lightning bolt (Zap icon shape, scaled up) -->
    <path d="M 30,-130 L -50,-130 L -10,-30 L -60,-30 L 50,130 L 10,20 L 60,20 Z"
          fill="#FFFFFF" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round"/>
  </g>

  <!-- "EVDx" text (matches app branding) -->
  <text x="512" y="800" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="96" font-weight="800" fill="#00D2FF" letter-spacing="4">EVDx</text>

  <!-- Subtitle -->
  <text x="512" y="870" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="28" font-weight="400" fill="#78909C" letter-spacing="6">EV DIAGNOSTICS</text>
</svg>
