name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript · tsc --noEmit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Type-check
        run: bun x tsc --noEmit

  build-web:
    name: Next.js · static export
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Build static export
        run: bun run build:static

  obd-protocol-test:
    name: OBD-II · protocol simulation (34 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run protocol simulation test
        run: node scripts/obd-protocol-sim.test.mjs

  build-apk:
    name: Android · release APK
    runs-on: ubuntu-latest
    needs: [typecheck, build-web, obd-protocol-test]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" > /dev/null 2>&1 || true
      - name: Install dependencies
        run: bun install
      - name: Build static export
        run: bun run build:static
      - name: Sync Capacitor
        run: bun x cap sync android
      - name: Generate release keystore
        run: |
          if [ -n "${{ secrets.EVDX_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.EVDX_KEYSTORE_BASE64 }}" | base64 -d > evdx.keystore
          else
            keytool -genkey -v -keystore evdx.keystore -alias evdx -keyalg RSA -keysize 2048 -validity 10000 -storepass evdx123 -keypass evdx123 -dname "CN=CI Build, OU=EVDx, O=GitHub Actions, L=CI, ST=CI, C=OM"
          fi
      - name: Build release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: evdx-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
