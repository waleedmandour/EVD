apply plugin: 'com.android.application'

android {
    namespace = "com.waleedmandour.evdx"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.waleedmandour.evdx"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 10
        versionName "1.5.3"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    // Release signing config — uses evdx.keystore (generated by build-apk.sh)
    // if present, otherwise falls back to the debug keystore so local builds
    // still work without a setup step.
    signingConfigs {
        release {
            def ksFile = file("${rootProject.projectDir}/../evdx.keystore")
            if (ksFile.exists()) {
                storeFile ksFile
                storePassword "evdx123"
                keyAlias "evdx"
                keyPassword "evdx123"
            } else {
                storeFile signingConfigs.debug.storeFile
                storePassword signingConfigs.debug.storePassword
                keyAlias signingConfigs.debug.keyAlias
                keyPassword signingConfigs.debug.keyPassword
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    buildFeatures {
        viewBinding true
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
    // HMS Core Maven repository (for Huawei AppGallery compatibility)
    maven { url 'https://developer.huawei.com/repo/' }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.constraintlayout:constraintlayout:$androidxConstraintLayoutVersion"

    // Capacitor (WebView host + BLE plugin fallback)
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')

    // HMS Core — Huawei AppGallery compatibility.
    // These are OPTIONAL at runtime — the app works fine without HMS Core
    // installed (e.g. on non-Huawei devices). They provide:
    //   - agconnect-core: AppGallery Connect integration
    //   - ml-computer-voice-asr: On-device speech recognition fallback
    //   - ml-computer-voice-tts: On-device text-to-speech fallback
    // All HMS processing is on-device — no data is sent to Huawei servers.
    implementation 'com.huawei.hms:agconnect-core:1.9.1.301'
    implementation 'com.huawei.hms:ml-computer-voice-asr:3.11.0.301'
    implementation 'com.huawei.hms:ml-computer-voice-tts:3.11.0.301'

    // Testing
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied.")
}
